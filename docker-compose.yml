services:
  # Test Runner (isolated, profile-gated)
  test:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_test
    profiles:
      - test  # Only starts with --profile test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://docuchat_user:changeme@postgres:5432/docuchat_db}
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_DEBUG: "True"
    volumes:
      - ./src/backend:/app
    command: pytest -v --reuse-db --nomigrations
    networks:
      - docuchat_network

  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docuchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docuchat_db}
      POSTGRES_USER: ${POSTGRES_USER:-docuchat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuchat_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuchat_network

  # Redis Cache and Celery Broker
  redis:
    image: redis:7-alpine
    container_name: docuchat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuchat_network

  # Django Backend API
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-google}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - ./src/backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - docuchat_network

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_celery_worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-google}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - ./src/backend:/app
      - backend_media:/app/media
    command: celery -A config worker --loglevel=info --concurrency=4
    networks:
      - docuchat_network

  # Celery Beat for Scheduled Tasks
  celery_beat:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_celery_beat
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - ./src/backend:/app
    command: celery -A config beat --loglevel=info
    networks:
      - docuchat_network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: docuchat_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - backend_static:/static:ro
      - backend_media:/media:ro
      - ./src/frontend/dist:/usr/share/nginx/html:ro
    networks:
      - docuchat_network

  # Frontend Development Server
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    container_name: docuchat_frontend
    restart: unless-stopped
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-DocuChat}
    command: npm run dev -- --host
    networks:
      - docuchat_network

# Docker Networks
networks:
  docuchat_network:
    driver: bridge
    name: docuchat_network

# Docker Volumes
volumes:
  postgres_data:
    name: docuchat_postgres_data
  redis_data:
    name: docuchat_redis_data
  backend_static:
    name: docuchat_backend_static
  backend_media:
    name: docuchat_backend_media