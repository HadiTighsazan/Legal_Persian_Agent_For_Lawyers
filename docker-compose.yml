services:
  # Test Runner (isolated, profile-gated)
  test:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_test
    profiles:
      - test  # Only starts with --profile test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://docuchat_user:changeme@postgres:5432/docuchat_db}
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_DEBUG: "True"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-bge-m3}
    volumes:
      - ./src/backend:/app
    command: pytest -v --reuse-db --nomigrations
    networks:
      - docuchat_network

  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docuchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docuchat_db}
      POSTGRES_USER: ${POSTGRES_USER:-docuchat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuchat_user} -d ${POSTGRES_DB:-docuchat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuchat_network

  # Redis Cache and Celery Broker
  redis:
    image: redis:7-alpine
    container_name: docuchat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuchat_network

  # Django Backend API
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    image: docuchat_backend
    container_name: docuchat_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-bge-m3}

      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-deepseek-chat}
      OPENAI_CHAT_MAX_TOKENS: ${OPENAI_CHAT_MAX_TOKENS:-4096}

      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}

      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      
    volumes:
      - ./src/backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - C:/Users/starlap/Desktop/Developer_Tools/chunked_datasets:/data/chunked_datasets
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - docuchat_network

  # Celery Worker for Background Tasks
  celery_worker:
    image: docuchat_backend
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_celery_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-bge-m3}

      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-deepseek-chat}
      OPENAI_CHAT_MAX_TOKENS: ${OPENAI_CHAT_MAX_TOKENS:-4096}

      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}

      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - ./src/backend:/app
      - backend_media:/app/media
      - C:/Users/starlap/Desktop/Developer_Tools/chunked_datasets:/data/chunked_datasets
    command: celery -A config worker --loglevel=info --concurrency=4
    networks:
      - docuchat_network

  # Celery Beat for Scheduled Tasks
  celery_beat:
    image: docuchat_backend
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: docuchat_celery_beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-bge-m3}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-deepseek-chat}
      OPENAI_CHAT_MAX_TOKENS: ${OPENAI_CHAT_MAX_TOKENS:-4096}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - ./src/backend:/app
    command: celery -A config beat --loglevel=info
    networks:
      - docuchat_network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
      target: production
    container_name: docuchat_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - backend_static:/static:ro
      - backend_media:/media:ro
    networks:
      - docuchat_network

  # Frontend Development Server
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
      target: dev  # Use the dev stage (has node/npm for hot-reload)
    container_name: docuchat_frontend
    restart: unless-stopped
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # NOTE: In development, the frontend (port 5173) calls the backend directly
      # on port 8000. The Django backend does NOT have an /api prefix — that's
      # only added by nginx in production. So the correct URL is localhost:8000
      # (without /api). The normalizeBaseUrl() function adds the trailing slash.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_APP_NAME: ${VITE_APP_NAME:-DocuChat}
    command: npm run dev -- --host
    networks:
      - docuchat_network

# Docker Networks
networks:
  docuchat_network:
    driver: bridge
    name: docuchat_network

# Docker Volumes
volumes:
  postgres_data:
    name: docuchat_postgres_data
  redis_data:
    name: docuchat_redis_data
  backend_static:
    name: docuchat_backend_static
  backend_media:
    name: docuchat_backend_media
